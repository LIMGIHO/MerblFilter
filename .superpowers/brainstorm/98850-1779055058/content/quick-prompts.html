<h2>퀵 프롬프트 동작 방식</h2>
<p class="subtitle">컨텍스트 바뀔 때 퀵 프롬프트도 바뀌면 어떨까요?</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>컨텍스트별 퀵 프롬프트</h3>
      <p>선택한 컨텍스트에 맞는 버튼만 표시</p>

      <div style="margin-top:10px">
        <div style="font-size:11px;color:#0d9488;font-weight:600;margin-bottom:4px">📄 본문 선택 시</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <span style="padding:3px 10px;border-radius:12px;border:1px solid #99f6e4;color:#0d9488;font-size:11px">3줄 요약</span>
          <span style="padding:3px 10px;border-radius:12px;border:1px solid #99f6e4;color:#0d9488;font-size:11px">핵심 포인트</span>
          <span style="padding:3px 10px;border-radius:12px;border:1px solid #99f6e4;color:#0d9488;font-size:11px">한줄 코멘트</span>
        </div>
      </div>

      <div style="margin-top:8px">
        <div style="font-size:11px;color:#6366f1;font-weight:600;margin-bottom:4px">💬 댓글 선택 시</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <span style="padding:3px 10px;border-radius:12px;border:1px solid #c7d2fe;color:#6366f1;font-size:11px">댓글 반응 분석</span>
          <span style="padding:3px 10px;border-radius:12px;border:1px solid #c7d2fe;color:#6366f1;font-size:11px">스팸 찾기</span>
          <span style="padding:3px 10px;border-radius:12px;border:1px solid #c7d2fe;color:#6366f1;font-size:11px">부정적 댓글</span>
        </div>
      </div>

      <div style="margin-top:8px">
        <div style="font-size:11px;color:#64748b;font-weight:600;margin-bottom:4px">전체 선택 시</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <span style="padding:3px 10px;border-radius:12px;border:1px solid #e2e8f0;color:#64748b;font-size:11px">종합 요약</span>
          <span style="padding:3px 10px;border-radius:12px;border:1px solid #e2e8f0;color:#64748b;font-size:11px">댓글 반응</span>
          <span style="padding:3px 10px;border-radius:12px;border:1px solid #e2e8f0;color:#64748b;font-size:11px">스팸 찾기</span>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>퀵 프롬프트 고정</h3>
      <p>항상 같은 버튼, 컨텍스트만 자동 결정</p>

      <div style="margin-top:10px;display:flex;gap:4px;flex-wrap:wrap">
        <span style="padding:3px 10px;border-radius:12px;border:1px solid #99f6e4;color:#0d9488;font-size:11px">3줄 요약</span>
        <span style="padding:3px 10px;border-radius:12px;border:1px solid #99f6e4;color:#0d9488;font-size:11px">한줄 코멘트</span>
        <span style="padding:3px 10px;border-radius:12px;border:1px solid #99f6e4;color:#0d9488;font-size:11px">댓글 반응</span>
        <span style="padding:3px 10px;border-radius:12px;border:1px solid #99f6e4;color:#0d9488;font-size:11px">스팸 찾기</span>
        <span style="padding:3px 10px;border-radius:12px;border:1px solid #99f6e4;color:#0d9488;font-size:11px">부정적 댓글</span>
      </div>

      <div style="margin-top:10px;font-size:12px;color:#94a3b8">
        "3줄 요약" 클릭 → AI가 알아서 본문 컨텍스트로<br>
        "댓글 반응" 클릭 → AI가 알아서 댓글 컨텍스트로
      </div>
    </div>
  </div>
</div>
